<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HR Login - Leave Management System</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Khula:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow:hidden;
    font-family:'Khula',sans-serif;

    background:linear-gradient(
        180deg,
        #FF9F18 0%,
        #D54E00 100%
    );
}

/* BACKGROUND */

.background{
    position:fixed;
    inset:0;
    overflow:hidden;
}

.glow-dark{
    position:absolute;
    width:1200px;
    height:1200px;

    left:-450px;
    top:-350px;

    border-radius:50%;

    background:linear-gradient(
        180deg,
        #3A5A8F 24%,
        #111A29 100%
    );

    filter:blur(90px);
}

.glow-blue{
    position:absolute;

    width:1000px;
    height:1000px;

    left:-250px;
    top:-180px;

    border-radius:50%;

    background:linear-gradient(
        180deg,
        #333A73 0%,
        #50C4ED 100%
    );
}

/* LAYOUT */

.container{
    position:relative;
    z-index:10;

    width:100%;
    height:100vh;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:60px 100px;
}

/* LEFT SIDE */

.left{
    flex:1;

    display:flex;
    align-items:center;
    justify-content:center;
}

/* FUTURE ROBOT IMAGE */

.robot-image{
    width:450px;
    max-width:90%;
}

/* RIGHT SIDE */

.right{
    width:100%;
    max-width:520px;
}

.login-card{

    background:#F8F8F8;

    border-radius:50px;

    padding:40px;

    border:2px solid #E5E5E5;

    box-shadow:
        0 20px 40px rgba(0,0,0,0.15);
}

.logo{

    font-size:14px;
    font-weight:700;

    color:#666;

    letter-spacing:2px;

    margin-bottom:12px;
}

h1{

    font-size:52px;

    color:#333A73;

    margin-bottom:5px;
}

.subtitle{

    font-family:'Inter',sans-serif;

    color:#666;

    margin-bottom:25px;

    font-size:14px;
}

.input-group{
    margin-bottom:14px;
}

input[type="email"],
input[type="password"]{

    width:100%;
    height:56px;

    border:2px solid #D9D9D9;

    border-radius:20px;

    padding:0 18px;

    font-size:15px;

    font-family:'Inter',sans-serif;

    outline:none;

    transition:.25s;
}

input[type="email"]:focus,
input[type="password"]:focus{

    border-color:#50C4ED;
}

.options{

    display:flex;
    align-items:center;

    margin-top:10px;
    margin-bottom:20px;
}

.remember{

    display:flex;
    align-items:center;

    gap:8px;

    font-family:'Inter',sans-serif;

    font-size:14px;
}

input[type="checkbox"]{
    width:16px;
    height:16px;
}

/* BUTTONS */

.login-btn{

    width:100%;
    height:60px;

    border:none;

    border-radius:20px;

    cursor:pointer;

    color:white;

    font-size:18px;
    font-weight:700;

    background:linear-gradient(
        180deg,
        #3A5B90 0%,
        #15233A 100%
    );

    transition:.25s;
}

.login-btn:hover{
    transform:translateY(-2px);
}

.back-btn{

    width:100%;
    height:55px;

    margin-top:12px;

    border:none;

    border-radius:20px;

    cursor:pointer;

    color:#333A73;

    font-size:16px;
    font-weight:700;

    background:#ECECEC;

    transition:.25s;
}

.back-btn:hover{
    background:#E2E2E2;
}

.links{

    margin-top:20px;

    text-align:center;

    font-family:'Inter',sans-serif;

    font-size:14px;
}

.links a{

    color:#3A5A8F;

    font-weight:700;

    text-decoration:none;
}

.links a:hover{
    text-decoration:underline;
}

/* MOBILE */

@media(max-width:1100px){

    body{
        overflow:auto;
    }

    .container{

        flex-direction:column;

        justify-content:center;

        gap:30px;

        padding:30px;
    }

    .left{
        min-height:120px;
    }

    h1{
        font-size:42px;
    }
}

</style>
</head>

<body>

<div class="background">

    <div class="glow-dark"></div>

    <div class="glow-blue"></div>

</div>

<div class="container">

    <!-- LEFT SIDE -->

    <div class="left">

        <!--

        ADD ROBOT PNG HERE LATER

        Example:

        <img src="images/hr-robot.png"
            

        -->

    </div>

    <!-- RIGHT SIDE -->

    <div class="right">

        <div class="login-card">

            <div class="logo">
                HR LEAVE MANAGEMENT SYSTEM
            </div>

            <h1>HR Login</h1>

            <p class="subtitle">
                Access the HR Management Portal
            </p>

            <form>

                <div class="input-group">

                    <input
                        type="email"
                        placeholder="Work Email"
                        required>

                </div>

                <div class="input-group">

                    <input
                        type="password"
                        placeholder="Password"
                        required>

                </div>

                <div class="options">

                    <label class="remember">

                        <input type="checkbox">

                        Remember Me

                    </label>

                </div>

                <!-- HR DASHBOARD DESTINATION -->

                <button
                    type="button"
                    class="login-btn"
                    onclick="window.location.href='ADD_HR_DASHBOARD_HERE.html'">

                    HR Log In

                </button>

                <!-- BACK PAGE DESTINATION -->

                <button
                    type="button"
                    class="back-btn"
                    onclick="window.location.href='ADD_BACK_PAGE_HERE.html'">

                    Back

                </button>

            </form>

            <div class="links">

                Return to

                <!-- EMPLOYEE LOGIN PAGE -->

                <a href="ADD_EMPLOYEE_LOGIN_PAGE_HERE.html">

                    Employee Login

                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
